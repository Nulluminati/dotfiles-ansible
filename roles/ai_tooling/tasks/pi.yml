---
# Pi AI CLI tool configuration
# Extensions are loaded via the packages array in ~/.pi/agent/settings.json
# which is managed by the stow dotfiles setup

- name: Ensure pi agent directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.pi/agent"
    state: directory
    mode: "0700"
  tags:
    - pi
    - config
