---
- name: Import repositories GPG keys
  become: true
  rpm_key:
    state: present
    key: "{{ item.gpg_url }}"
  loop: "{{ fedora_repositories }}"
  tags:
    - repos

- name: Add repositories
  become: true
  yum_repository:
    name: "{{ item.name }}"
    description: "{{ item.description }}"
    baseurl: "{{ item.url }}"
    gpgkey: "{{ item.gpg_url }}"
    gpgcheck: "{{ item.gpg_check | bool }}"
    enabled: yes
  loop: "{{ fedora_repositories }}"
  tags:
    - repos

- name: Import RPM Fusion Free GPG key
  become: true
  rpm_key:
    state: present
    key: https://rpmfusion.org/keys?action=AttachFile&do=get&target=RPM-GPG-KEY-rpmfusion-free-{{ ansible_distribution | lower }}-2020
  tags:
    - repos

- name: Install RPM Fusion Free
  become: true
  dnf:
    name: https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ansible_distribution_major_version}}.noarch.rpm
    state: present
  tags:
    - repos

- name: Add copr repositories
  become: yes
  shell: dnf copr enable {{ item.name }} -y
  args:
    creates: /etc/yum.repos.d/{{ item.creates }}
  loop: "{{ copr_repositories }}"
  tags:
    - repos

- name: Install command line tools in Fedora
  become: true
  dnf:
    name: "{{ cli_dnf_packages }}"
    state: present
  tags:
    - packages

- name: Grant cap_perfmon capability to intel_gpu_top
  become: true
  capabilities:
    path: /usr/bin/intel_gpu_top
    capability: cap_perfmon=ep
    state: present
  tags:
    - packages

# Flatpak applications (e.g. Obsidian) are installed from Flathub.
# Add app IDs to flatpak_packages in defaults/main.yml.
- name: Ensure flatpak is installed
  become: true
  dnf:
    name: flatpak
    state: present
  tags:
    - flatpak

- name: Add Flathub remote
  become: true
  community.general.flatpak_remote:
    name: flathub
    state: present
    flatpakrepo_url: "{{ flathub_repo_url }}"
    method: system
  tags:
    - flatpak

- name: Install Flatpak applications from Flathub
  become: true
  community.general.flatpak:
    name: "{{ flatpak_packages }}"
    remote: flathub
    state: present
    method: system
  tags:
    - flatpak

# Some Flatpak apps bundle a CLI that registers itself under ~/.local/bin on
# first run (e.g. the Obsidian CLI). Ensure that directory exists and is on PATH.
- name: Ensure local bin directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: '0755'
  tags:
    - flatpak

# Docker
# Add user to docker group
- name: Add user to docker group
  become: yes
  user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: yes
  tags:
    - docker

# Fish Shell
- name: Setup Fish Shell
  import_tasks: fish.yml

# NodeJS
- name: Install node
  shell: |
    if not nvm list | grep -q {{ item }}
      nvm install {{ item }}
    end
  args:
    executable: /usr/bin/fish
  loop: "{{ node_versions }}"
  register: nvm_install_result
  changed_when: "'installed' in nvm_install_result.stdout or 'now' in nvm_install_result.stdout"
  tags:
    - nodejs

# AWS CLI
- name: Install AWS CLI
  import_tasks: aws.yml

# Bun
- name: Install bun
  ansible.builtin.shell:
    cmd: "curl -fsSL https://bun.sh/install | bash"
    creates: "~/.bun/bin/bun"
  tags:
    - bun

- name: Install bun packages
  ansible.builtin.shell:
    cmd: "~/.bun/bin/bun install -g {{ item }}"
    creates: "~/.bun/bin/{{ item.split('/')[-1] | replace('@', '') }}"
  loop: "{{ bun_packages }}"
  tags:
    - bun

# Github CLI Extensions
- name: Install gh extensions
  shell: gh extension install {{ item }}
  args:
    executable: /usr/bin/fish
  loop: "{{ gh_extensions }}"
  tags:
    - gh

# API Keys for polybar scripts
- name: Set API keys as fish universal variables
  shell: |
    set -Ux BRAVE_API_KEY {{ api_keys.brave }}
    set -Ux CLAUDE_API_KEY {{api_keys.claude}}
    set -Ux FIREWORKS_API_KEY {{ api_keys.fireworks }}
    set -Ux NEURALWATT_API_KEY {{ api_keys.neuralwatt }}
    set -Ux OPENAI_API_KEY {{ api_keys.openai }}
    set -Ux OPENCODE_API_KEY {{ api_keys.opencode }}
    set -Ux OPENROUTER_API_KEY {{ api_keys.openrouter }}
    set -Ux OPENWEATHER_API_KEY {{ api_keys.openweather }}
    set -Ux SYNTHETIC_API_KEY {{ api_keys.synthetic }}
    set -Ux ZAI_API_KEY {{ api_keys.zai }}
  args:
    executable: /usr/bin/fish
  tags:
    - api_keys

# Talos Linux CLI tools
- name: Install Talos Linux tools
  import_tasks: talos.yml
